<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morpion Dynamique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Morpion</h1>
        
        <div id="setup">
            <label for="mode">Mode de jeu :</label>
            <select id="mode">
                <option value="2players">2 Joueurs (Local)</option>
                <option value="ai">Contre l'IA</option>
            </select>
            <button id="start-btn">Jouer</button>
        </div>

        <div id="scoreboard" class="hidden">
            <div class="score">Joueur X : <span id="score-x">0</span></div>
            <div class="score">Joueur O (IA) : <span id="score-o">0</span></div>
        </div>

        <div id="board" class="hidden">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="restart-btn" class="hidden">Recommencer</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
